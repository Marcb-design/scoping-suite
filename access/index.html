<script>
const jsPDF = window.jspdf ? window.jspdf.jsPDF : window.jsPDF;
const STORAGE_KEY = "accessJobs_v1";
const MAX_BEFORE_PHOTOS = 5;
const MAX_AFTER_PHOTOS = 5;

let jobsData = { jobs: {}, currentJobId: null };

function cleanAccessName(str) {
    return String(str || "")
        .trim()
        .replace(/\s+/g, " ")
        .replace(/[^\w\s\-]/g, "");
}

function createStorageKey() {
    return `job_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

function saveJobsData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jobsData));
}

function normalizeJob(job) {
    return {
        id: job.id || "",
        shiftDate: job.shiftDate || todayISO(),
        engineerName: job.engineerName || "",
        photos: Array.isArray(job.photos) ? job.photos : [],
        afterPhotos: Array.isArray(job.afterPhotos) ? job.afterPhotos : [],
        completionNotes: job.completionNotes || "",
        completedBy: job.completedBy || "",
        expectedCompletionDate: job.expectedCompletionDate || "",
        completedDate: job.completedDate || "",
        jobReference: job.jobReference || "",
        sequence: job.sequence || "",
        sequenceOwnerInitials: job.sequenceOwnerInitials || "",
        sections: Array.isArray(job.sections) && job.sections.length ? job.sections : [createBlankSection()]
    };
}

function loadJobsData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            jobsData = JSON.parse(saved);
        } catch (e) {
            jobsData = { jobs: {}, currentJobId: null };
        }
    }

    if (!jobsData.jobs || typeof jobsData.jobs !== "object") jobsData.jobs = {};

    for (const key of Object.keys(jobsData.jobs)) {
        jobsData.jobs[key] = normalizeJob(jobsData.jobs[key]);
    }
}

function getCurrentJob() {
    return jobsData.jobs[jobsData.currentJobId] || null;
}

function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function getInitials(name) {
    if (!name) return "";
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "";
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return parts[0][0].toUpperCase() + parts[parts.length - 1][0].toUpperCase();
}

function getEngineerInitials(name) {
    if (!name) return "";
    return name
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map(part => part[0].toUpperCase())
        .join("");
}

function getNextSequenceForEngineer(initials, currentJob = null) {
    let max = 0;

    for (const key of Object.keys(jobsData.jobs)) {
        const job = jobsData.jobs[key];
        if (!job || job === currentJob || !job.id) continue;
        if (!job.id.startsWith(initials + "-")) continue;

        const match = job.id.match(/ (\d+)$/);
        const seq = match ? parseInt(match[1], 10) : NaN;
        if (!isNaN(seq) && seq > max) max = seq;
    }

    return String(max + 1).padStart(3, "0");
}

function createBlankSection() {
    return {
        fields: {
            accessName: "",
            w3w: "",
            mileageMiles: "",
            mileageChains: "",
            elr: "",
            nearestLine: "",
            accessType: "",
            parkingAvailable: "",
            parkingNotes: "",
            hazards: "",
            underfoot: "",
            vegetation: "",
            lorrySuitable: "",
            ohlPresent: "",
            notes: ""
        },
        items: [
            { materialType: "", condition: "", uom: "", qty: "", notes: "", distance: "", status: "" }
        ]
    };
}

function createNewJob() {
    const storageKey = createStorageKey();
    jobsData.jobs[storageKey] = normalizeJob({
        id: "",
        shiftDate: todayISO(),
        engineerName: document.getElementById("engineer-name")?.value?.trim() || "",
        sections: [createBlankSection()]
    });
    jobsData.currentJobId = storageKey;
    saveJobsData();
    renderAllSections();
}

function rebuildJobIdentity() {
    const job = getCurrentJob();
    if (!job) return;

    const section = job.sections && job.sections[0] ? job.sections[0] : createBlankSection();
    job.sections[0] = section;

    const cleanedAccess = cleanAccessName(section.fields.accessName || "");
    const initials = getEngineerInitials(job.engineerName || "");

    job.jobReference = cleanedAccess;

    if (!cleanedAccess || !initials) {
        job.id = "";
        saveJobsData();
        updateJobHeaderFields();
        return;
    }

    if (!job.sequence || job.sequenceOwnerInitials !== initials) {
        job.sequence = getNextSequenceForEngineer(initials, job);
        job.sequenceOwnerInitials = initials;
    }

    job.id = `${initials}-${cleanedAccess} ${job.sequence}`;
    saveJobsData();
    updateJobHeaderFields();
}

function updateJobHeaderFields() {
    const job = getCurrentJob();
    const jobIdInput = document.getElementById("job-id");
    const jobDateInput = document.getElementById("job-date");
    const engineerNameInput = document.getElementById("engineer-name");
    const completedByInput = document.getElementById("completed-by");
    const expectedCompletionDateInput = document.getElementById("expected-completion-date");
    const completedDateInput = document.getElementById("completed-date");
    const jobReferenceInput = document.getElementById("job-reference");
    const completionNotesInput = document.getElementById("completion-notes");

    if (!job) {
        jobIdInput.value = "";
        jobDateInput.value = "";
        engineerNameInput.value = "";
        completedByInput.value = "";
        expectedCompletionDateInput.value = "";
        completedDateInput.value = "";
        jobReferenceInput.value = "";
        completionNotesInput.value = "";
        document.getElementById("after-photo-preview").innerHTML = "";
        return;
    }

    jobIdInput.value = job.id || "";
    jobDateInput.value = job.shiftDate || "";
    engineerNameInput.value = job.engineerName || "";
    completedByInput.value = job.completedBy || "";
    expectedCompletionDateInput.value = job.expectedCompletionDate || "";
    completedDateInput.value = job.completedDate || "";
    jobReferenceInput.value = job.jobReference || "";
    completionNotesInput.value = job.completionNotes || "";

    renderPhotoPreview();
    renderAfterPhotoPreview();
}

function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}



function fixImageOrientation(file) {
    return new Promise(async (resolve, reject) => {
        const fallback = () => readFileAsDataURL(file).then(resolve).catch(reject);

        const canvasFromSource = (source, width, height) => {
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
                fallback();
                return;
            }
            ctx.drawImage(source, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", 0.92));
        };

        try {
            if (window.createImageBitmap) {
                try {
                    const bitmap = await createImageBitmap(file, { imageOrientation: "from-image" });
                    canvasFromSource(bitmap, bitmap.width, bitmap.height);
                    return;
                } catch (e) {
                    // Fall back to EXIF/manual handling below.
                }
            }

            const processWithOrientation = (orientation) => {
                const reader = new FileReader();

                reader.onload = function (e) {
                    const img = new Image();

                    img.onload = function () {
                        const width = img.naturalWidth || img.width;
                        const height = img.naturalHeight || img.height;
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");

                        if (!ctx || !width || !height) {
                            fallback();
                            return;
                        }

                        if ([5, 6, 7, 8].includes(orientation)) {
                            canvas.width = height;
                            canvas.height = width;
                        } else {
                            canvas.width = width;
                            canvas.height = height;
                        }

                        switch (orientation) {
                            case 2:
                                ctx.translate(width, 0);
                                ctx.scale(-1, 1);
                                break;
                            case 3:
                                ctx.translate(width, height);
                                ctx.rotate(Math.PI);
                                break;
                            case 4:
                                ctx.translate(0, height);
                                ctx.scale(1, -1);
                                break;
                            case 5:
                                ctx.rotate(0.5 * Math.PI);
                                ctx.scale(1, -1);
                                ctx.drawImage(img, 0, -height, width, height);
                                resolve(canvas.toDataURL("image/jpeg", 0.92));
                                return;
                            case 6:
                                ctx.rotate(0.5 * Math.PI);
                                ctx.translate(0, -height);
                                break;
                            case 7:
                                ctx.rotate(0.5 * Math.PI);
                                ctx.translate(width, -height);
                                ctx.scale(-1, 1);
                                break;
                            case 8:
                                ctx.rotate(-0.5 * Math.PI);
                                ctx.translate(-width, 0);
                                break;
                        }

                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL("image/jpeg", 0.92));
                    };

                    img.onerror = function () { fallback(); };
                    img.src = e.target.result;
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            };

            if (!window.EXIF) {
                fallback();
                return;
            }

            try {
                EXIF.getData(file, function () {
                    const orientation = EXIF.getTag(this, "Orientation") || 1;
                    processWithOrientation(orientation);
                });
            } catch (err) {
                fallback();
            }
        } catch (err) {
            fallback();
        }
    });
}

async function addPhotosFromInput(input, type) {
    const job = getCurrentJob();
    if (!job || !input.files || !input.files.length) return;

    const targetKey = type === "after" ? "afterPhotos" : "photos";
    const maxPhotos = type === "after" ? MAX_AFTER_PHOTOS : MAX_BEFORE_PHOTOS;
    job[targetKey] = Array.isArray(job[targetKey]) ? job[targetKey] : [];

    const remaining = maxPhotos - job[targetKey].length;
    if (remaining <= 0) {
        alert(`Maximum of ${maxPhotos} ${type.toUpperCase()} photos allowed.`);
        input.value = "";
        return;
    }

    const files = Array.from(input.files).slice(0, remaining);
    if (input.files.length > remaining) {
        alert(`Only the first ${remaining} ${type.toUpperCase()} photo(s) were added. Maximum is ${maxPhotos}.`);
    }

    for (const file of files) {
        try {
            const corrected = await fixImageOrientation(file);
            job[targetKey].push(corrected);
        } catch (e) {
            console.error("Photo upload failed", e);
        }
    }

    saveJobsData();
    if (type === "after") {
        renderAfterPhotoPreview();
    } else {
        renderPhotoPreview();
    }
    input.value = "";
}

function handleMultiPhotoUpload(input) {
    addPhotosFromInput(input, "before");
}

function handleAfterPhotoUpload(input) {
    addPhotosFromInput(input, "after");
}


function renderPreview(containerId, photos, onDelete) {
    const container = document.getElementById(containerId);
    if (!container) return;

    container.innerHTML = "";
    container.style.display = "flex";
    container.style.flexWrap = "wrap";
    container.style.gap = "8px";
    container.style.marginTop = "8px";

    (photos || []).forEach((src, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "preview-photo-card";

        const img = document.createElement("img");
        img.src = typeof src === "string" ? src : (src && src.dataUrl ? src.dataUrl : "");
        img.alt = `Attached photo ${idx + 1}`;

        const del = document.createElement("button");
        del.type = "button";
        del.textContent = "Remove";
        del.className = "small-btn";
        del.style.background = "#d9534f";
        del.onclick = () => onDelete(idx);

        wrap.appendChild(img);
        wrap.appendChild(del);
        container.appendChild(wrap);
    });
}

function renderPhotoPreview() {
    const job = getCurrentJob();
    if (!job) return;
    renderPreview("photo-preview", job.photos || [], idx => {
        job.photos.splice(idx, 1);
        saveJobsData();
        renderPhotoPreview();
    });
}

function renderAfterPhotoPreview() {
    const job = getCurrentJob();
    if (!job) return;
    renderPreview("after-photo-preview", job.afterPhotos || [], idx => {
        job.afterPhotos.splice(idx, 1);
        saveJobsData();
        renderAfterPhotoPreview();
    });
}

function renderAllSections() {
    const job = getCurrentJob();
    const container = document.getElementById("sectionsContainer");
    container.innerHTML = "";
    if (!job) return;

    updateJobHeaderFields();

    const section = job.sections[0] || createBlankSection();
    job.sections[0] = section;

    container.appendChild(renderSection(job, section));
    renderPhotoPreview();
    renderAfterPhotoPreview();
}

function renderSection(job, sectionData) {
    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";

    const title = document.createElement("span");
    title.className = "section-title";
    title.textContent = "Access Point";

    header.appendChild(title);
    sectionEl.appendChild(header);

    const row1 = document.createElement("div");
    row1.className = "field-row";

    row1.appendChild(makeField("Access Point Name / ID:", sectionData.fields.accessName, v => {
        sectionData.fields.accessName = v;
        rebuildJobIdentity();
        saveJobsData();
    }));

    row1.appendChild(makeField("What3Words:", sectionData.fields.w3w, v => { sectionData.fields.w3w = v; saveJobsData(); }));
    row1.appendChild(makeField("Mileage (Miles):", sectionData.fields.mileageMiles, v => { sectionData.fields.mileageMiles = v; saveJobsData(); }));
    row1.appendChild(makeField("Mileage (Chains):", sectionData.fields.mileageChains, v => { sectionData.fields.mileageChains = v; saveJobsData(); }));
    row1.appendChild(makeField("ELR:", sectionData.fields.elr, v => { sectionData.fields.elr = v; saveJobsData(); }));
    sectionEl.appendChild(row1);

    const row1b = document.createElement("div");
    row1b.className = "field-row";
    row1b.appendChild(makeField("Nearest Running Line:", sectionData.fields.nearestLine, v => { sectionData.fields.nearestLine = v; saveJobsData(); }));
    row1b.appendChild(makeSelectField("Access Type:", sectionData.fields.accessType, v => { sectionData.fields.accessType = v; saveJobsData(); }, ["", "Vehicle", "On Foot"]));
    row1b.appendChild(makeSelectField("Parking Available:", sectionData.fields.parkingAvailable, v => { sectionData.fields.parkingAvailable = v; saveJobsData(); }, ["", "Yes", "No"]));
    row1b.appendChild(makeField("Parking Notes:", sectionData.fields.parkingNotes, v => { sectionData.fields.parkingNotes = v; saveJobsData(); }, "200px"));
    sectionEl.appendChild(row1b);

    const row2 = document.createElement("div");
    row2.className = "field-row";
    row2.appendChild(makeField("Hazards:", sectionData.fields.hazards, v => { sectionData.fields.hazards = v; saveJobsData(); }, "200px"));
    row2.appendChild(makeSelectField("Underfoot Conditions:", sectionData.fields.underfoot, v => { sectionData.fields.underfoot = v; saveJobsData(); }, ["", "Good", "Moderate", "Poor"]));
    row2.appendChild(makeSelectField("Vegetation Level:", sectionData.fields.vegetation, v => { sectionData.fields.vegetation = v; saveJobsData(); }, ["", "Good", "Moderate", "Poor"]));
    row2.appendChild(makeSelectField("Lorry Suitable:", sectionData.fields.lorrySuitable, v => { sectionData.fields.lorrySuitable = v; saveJobsData(); }, ["", "Yes", "No"]));
    row2.appendChild(makeSelectField("OHL Present:", sectionData.fields.ohlPresent, v => { sectionData.fields.ohlPresent = v; saveJobsData(); }, ["", "Yes", "No"]));
    sectionEl.appendChild(row2);

    const row3 = document.createElement("div");
    row3.className = "field-row";
    row3.appendChild(makeField("Notes:", sectionData.fields.notes, v => { sectionData.fields.notes = v; saveJobsData(); }, "260px"));
    sectionEl.appendChild(row3);

    const photoBlock = document.createElement("div");
    photoBlock.className = "photo-block";
    photoBlock.innerHTML = `
        <label>
            Add BEFORE Photo(s)
            <input type="file" accept="image/*" multiple onchange="handleMultiPhotoUpload(this)">
        </label>
        <div id="photo-preview"></div>
    `;
    sectionEl.appendChild(photoBlock);

    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const tr = document.createElement("tr");

    ["Material Type", "Condition", "UOM", "Qty", "Notes", "Distance from nearest running rail (m)", "Status", "Actions"].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        tr.appendChild(th);
    });

    thead.appendChild(tr);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    sectionData.items.forEach((item, idx) => {
        tbody.appendChild(renderItemRow(sectionData, item, idx));
    });
    table.appendChild(tbody);
    sectionEl.appendChild(table);

    const addLine = document.createElement("button");
    addLine.textContent = "Add Material";
    addLine.className = "small-btn";
    addLine.onclick = () => {
        sectionData.items.push({
            materialType: "",
            condition: "",
            uom: "",
            qty: "",
            notes: "",
            distance: "",
            status: ""
        });
        saveJobsData();
        renderAllSections();
    };
    sectionEl.appendChild(addLine);

    return sectionEl;
}

function makeField(labelText, value, onChange, minWidth) {
    const wrapper = document.createElement("label");
    wrapper.textContent = labelText;

    const input = document.createElement("input");
    input.value = value || "";
    if (minWidth) input.style.minWidth = minWidth;
    input.oninput = () => onChange(input.value);

    wrapper.appendChild(input);
    return wrapper;
}

function makeSelectField(labelText, value, onChange, options) {
    const wrapper = document.createElement("label");
    wrapper.textContent = labelText;

    const sel = document.createElement("select");
    options.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        sel.appendChild(opt);
    });

    sel.value = value || "";
    sel.onchange = () => onChange(sel.value);
    wrapper.appendChild(sel);
    return wrapper;
}

function updateMaterialStatus(row, item) {
    const statusTd = row.querySelector(".status-cell");
    if (!statusTd) return;

    const distance = parseInt(item.distance, 10);

    if (isNaN(distance)) {
        statusTd.textContent = "Awaiting input…";
        statusTd.style.background = "";
        statusTd.style.color = "";
        return;
    }

    if (distance < 3) {
        statusTd.textContent = "FAIL — Track Scoping Required";
        statusTd.style.background = "#c0392b";
        statusTd.style.color = "white";
    } else {
        statusTd.textContent = "PASS — No possession required (3m or > from nearest running line)";
        statusTd.style.background = "#2e8b57";
        statusTd.style.color = "white";
    }
}

function renderItemRow(sectionData, item, idx) {
    const tr = document.createElement("tr");

    tr.appendChild(makeSelectCell(item, "materialType", [
        "",
        "Ballast", "Bolts", "Catchpit Rings", "Chairs", "Clips", "Concrete Sleepers",
        "Crossing", "Drainage Pipes", "Fencing", "Fishplates", "Geotextile", "IBJ’s",
        "Pads", "Pea Gravel", "Plain Line Rail", "Switch", "Timbers", "Troughing",
        "Wooden Sleepers", "Other"
    ]));

    tr.appendChild(makeSelectCell(item, "condition", ["", "New", "Servicable", "Scrap"]));
    tr.appendChild(makeSelectCell(item, "uom", ["", "Each", "Metres", "Tonnes", "Tonne Bags"]));
    tr.appendChild(makeInputCell(item, "qty"));
    tr.appendChild(makeInputCell(item, "notes"));

    const distTd = document.createElement("td");
    const distInput = document.createElement("input");
    distInput.type = "number";
    distInput.min = "0";
    distInput.step = "1";
    distInput.value = item.distance || "";
    distInput.oninput = () => {
        item.distance = distInput.value;
        saveJobsData();
        updateMaterialStatus(tr, item);
    };
    distTd.appendChild(distInput);
    tr.appendChild(distTd);

    const statusTd = document.createElement("td");
    statusTd.className = "status-cell";
    statusTd.style.fontWeight = "bold";
    statusTd.style.textAlign = "center";
    statusTd.style.fontSize = "11px";
    statusTd.textContent = item.distance ? "" : "Awaiting input…";
    tr.appendChild(statusTd);

    setTimeout(() => updateMaterialStatus(tr, item), 0);

    const td = document.createElement("td");
    td.className = "actions-cell";

    const del = document.createElement("button");
    del.textContent = "Remove";
    del.className = "small-btn";
    del.style.background = "#d9534f";
    del.onclick = () => {
        sectionData.items.splice(idx, 1);
        if (!sectionData.items.length) {
            sectionData.items.push({ materialType: "", condition: "", uom: "", qty: "", notes: "", distance: "", status: "" });
        }
        saveJobsData();
        renderAllSections();
    };

    td.appendChild(del);
    tr.appendChild(td);

    return tr;
}

function makeInputCell(item, key) {
    const td = document.createElement("td");
    const input = document.createElement("input");
    input.value = item[key] || "";
    input.oninput = () => {
        item[key] = input.value;
        saveJobsData();
    };
    td.appendChild(input);
    return td;
}

function makeSelectCell(item, key, options) {
    const td = document.createElement("td");
    const sel = document.createElement("select");

    options.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        sel.appendChild(opt);
    });

    sel.value = item[key] || options[0];
    sel.onchange = () => {
        item[key] = sel.value;
        saveJobsData();
    };

    td.appendChild(sel);
    return td;
}

function getStatusText(item) {
    const distance = parseInt(item.distance, 10);
    if (isNaN(distance)) return "Awaiting input…";
    if (distance < 3) return "FAIL — Track Scoping Required";
    return "PASS — No possession required (3m or > from nearest running line)";
}

function exportCSV() {
    const job = getCurrentJob();
    if (!job) return alert("No job loaded.");

    const rows = [
        "JobID,ShiftDate,EngineerName,EngineerInitials,AccessPoint,AccessName,W3W,MileageMiles,MileageChains,ELR,NearestLine,AccessType,ParkingAvailable,ParkingNotes,Hazards,Underfoot,Vegetation,LorrySuitable,OHLPresent,Notes,MaterialType,Condition,UOM,Qty,MatNotes,Distance,Status,CompletedBy,ExpectedCompletionDate,CompletedDate,JobReference,CompletionNotes"
    ];

    const initials = getInitials(job.engineerName);
    const s = job.sections[0];

    s.items.forEach(item => {
        rows.push([
            job.id,
            job.shiftDate,
            job.engineerName || "",
            initials,
            1,
            s.fields.accessName,
            s.fields.w3w,
            s.fields.mileageMiles,
            s.fields.mileageChains,
            s.fields.elr,
            s.fields.nearestLine,
            s.fields.accessType,
            s.fields.parkingAvailable,
            s.fields.parkingNotes,
            s.fields.hazards,
            s.fields.underfoot,
            s.fields.vegetation,
            s.fields.lorrySuitable,
            s.fields.ohlPresent,
            s.fields.notes,
            item.materialType,
            item.condition,
            item.uom,
            item.qty,
            item.notes,
            item.distance || "",
            getStatusText(item),
            job.completedBy || "",
            job.expectedCompletionDate || "",
            job.completedDate || "",
            job.jobReference || "",
            job.completionNotes || ""
        ].map(v => `"${String(v || "").replace(/"/g, '""')}"`).join(","));
    });

    downloadBlob(new Blob([rows.join("\n")], { type: "text/csv" }), `${job.id || "access-job"}_access.csv`);
}

function formatUK(dateString) {
    if (!dateString) return "-";
    const [year, month, day] = dateString.split("-");
    return `${day}/${month}/${year}`;
}

async function exportPDF() {
    const job = getCurrentJob();
    if (!job) return alert("No job loaded.");

    const pdf = new jsPDF("l", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();

    function drawHeader() {
        pdf.setFillColor(10, 31, 68);
        pdf.rect(0, 0, pageWidth, 18, "F");

        pdf.setTextColor(255, 255, 255);
        pdf.setFontSize(14);
        pdf.text("Access Scoping Report", 10, 12);

        pdf.setFontSize(10);
        pdf.text(`Job: ${job.id || "-"}`, pageWidth - 110, 8);
        pdf.text(`Shift: ${formatUK(job.shiftDate)}`, pageWidth - 110, 12);
        pdf.text(`Engineer: ${job.engineerName || "-"}`, pageWidth - 110, 16);
        pdf.text(`Job Ref: ${job.jobReference || "-"}`, pageWidth - 60, 12);

        pdf.setTextColor(0, 0, 0);
    }

    const addPhotos = async (photoArray, label) => {
        const maxW = 180;
        const maxH = 120;

        for (let i = 0; i < photoArray.length; i++) {
            const src = photoArray[i];
            pdf.addPage();
            drawHeader();
            pdf.setFontSize(12);
            pdf.text(`${label} ${i + 1}`, 10, 24);

            await new Promise(resolve => {
                const img = new Image();
                img.onload = function () {
                    const w = img.width;
                    const h = img.height;
                    const scale = Math.min(maxW / w, maxH / h);
                    const newW = w * scale;
                    const newH = h * scale;
                    pdf.addImage(img, "JPEG", 10, 30, newW, newH);
                    resolve();
                };
                img.onerror = resolve;
                img.src = src;
            });
        }
    };

    drawHeader();
    let currentY = 24;

    const section = job.sections[0];
    const f = section.fields;

    pdf.setFontSize(12);
    pdf.text("Access Point", 10, currentY);
    currentY += 6;

    pdf.autoTable({
        startY: currentY,
        head: [["Field", "Value"]],
        body: [
            ["Access Name / ID", f.accessName || ""],
            ["What3Words", f.w3w || ""],
            ["Mileage", `${f.mileageMiles || ""}m ${f.mileageChains || ""}ch`],
            ["ELR", f.elr || ""],
            ["Nearest Running Line", f.nearestLine || ""],
            ["Access Type", f.accessType || ""],
            ["Parking Available", f.parkingAvailable || ""],
            ["Parking Notes", f.parkingNotes || ""],
            ["Hazards", f.hazards || ""],
            ["Underfoot Conditions", f.underfoot || ""],
            ["Vegetation Level", f.vegetation || ""],
            ["Lorry Suitable", f.lorrySuitable || ""],
            ["OHL Present", f.ohlPresent || ""],
            ["Notes", f.notes || ""]
        ],
        theme: "grid",
        styles: { fontSize: 9, cellPadding: 2 },
        headStyles: { fillColor: [226, 226, 226] },
        margin: { left: 10, right: 10 },
        didDrawPage: data => {
            if (data.pageNumber > 1) drawHeader();
        }
    });

    currentY = pdf.lastAutoTable.finalY + 6;

    const itemsBody = section.items.map(item => [
        item.materialType || "",
        item.condition || "",
        item.uom || "",
        item.qty || "",
        item.notes || "",
        item.distance || "",
        getStatusText(item)
    ]);

    if (itemsBody.length) {
        pdf.autoTable({
            startY: currentY,
            head: [["Material Type", "Condition", "UOM", "Qty", "Notes", "Distance (m)", "Status"]],
            body: itemsBody,
            theme: "grid",
            styles: { fontSize: 9, cellPadding: 2 },
            headStyles: { fillColor: [200, 200, 200] },
            margin: { left: 10, right: 10 },
            didParseCell: data => {
                if (data.section === "body" && data.column.index === 6) {
                    const item = section.items[data.row.index];
                    const distance = parseInt(item.distance, 10);
                    if (!isNaN(distance)) {
                        if (distance < 3) {
                            data.cell.styles.fillColor = [192, 57, 43];
                            data.cell.styles.textColor = [255, 255, 255];
                        } else {
                            data.cell.styles.fillColor = [46, 139, 87];
                            data.cell.styles.textColor = [255, 255, 255];
                        }
                    }
                }
            },
            didDrawPage: data => {
                if (data.pageNumber > 1) drawHeader();
            }
        });
    }

    if (job.photos && job.photos.length) {
        await addPhotos(job.photos, "Before Photo");
    }

    pdf.addPage();
    drawHeader();
    let y = 24;

    pdf.setFontSize(12);
    pdf.text("After Work Completion", 10, y);
    y += 8;

    pdf.setFontSize(10);
    pdf.text(`Completed By: ${job.completedBy || job.engineerName || "-"}`, 10, y); y += 5;
    pdf.text(`Expected Completion Date: ${formatUK(job.expectedCompletionDate)}`, 10, y); y += 5;
    pdf.text(`Completion Date: ${formatUK(job.completedDate)}`, 10, y); y += 5;
    pdf.text(`Job Reference: ${job.jobReference || "-"}`, 10, y); y += 8;

    pdf.setFontSize(12);
    pdf.text("Completion Notes", 10, y);
    y += 6;

    pdf.setFontSize(10);
    const notes = job.completionNotes || "-";
    const wrapped = pdf.splitTextToSize(notes, pageWidth - 20);
    pdf.text(wrapped, 10, y);
    y += wrapped.length * 5 + 10;

    pdf.text("Engineer Signature: ____________________________", 10, y);

    if (job.afterPhotos && job.afterPhotos.length) {
        await addPhotos(job.afterPhotos, "After Photo");
    }

    pdf.save(`${job.id || "access-job"}_access.pdf`);
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function handleNewJob() {
    if (getCurrentJob()) {
        const ok = confirm("Start a new job? Current job will stay saved and you’ll get a fresh sheet.");
        if (!ok) return;
    }
    createNewJob();
}

function handleJobDateChange() {
    const job = getCurrentJob();
    if (!job) return;

    const iso = document.getElementById("job-date").value;
    if (!iso) return;

    job.shiftDate = iso;
    saveJobsData();
    updateJobHeaderFields();
}

function handleEngineerNameChange() {
    const job = getCurrentJob();
    if (!job) return;

    job.engineerName = document.getElementById("engineer-name").value.trim();
    rebuildJobIdentity();
}

function openJobPicker() {
    const panel = document.getElementById("job-picker");
    const list = document.getElementById("job-picker-list");
    list.innerHTML = "";

    const keys = Object.keys(jobsData.jobs).sort((a, b) => {
        const aJob = jobsData.jobs[a];
        const bJob = jobsData.jobs[b];
        return (bJob.shiftDate || "").localeCompare(aJob.shiftDate || "") || ((bJob.id || "").localeCompare(aJob.id || ""));
    });

    if (!keys.length) {
        const msg = document.createElement("div");
        msg.textContent = "No saved jobs on this device.";
        list.appendChild(msg);
        panel.classList.remove("hidden");
        return;
    }

    keys.forEach(key => {
        const job = jobsData.jobs[key];
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.gap = "8px";
        row.style.marginBottom = "10px";

        const loadBtn = document.createElement("button");
        loadBtn.textContent = `${job.id || "(draft)"} | ${job.shiftDate || "-"} | ${job.engineerName || "-"}`;
        loadBtn.style.flex = "1";
        loadBtn.onclick = () => {
            jobsData.currentJobId = key;
            saveJobsData();
            renderAllSections();
            closeJobPicker();
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "small-btn";
        delBtn.style.background = "#b30000";
        delBtn.style.color = "white";
        delBtn.style.width = "80px";
        delBtn.onclick = () => {
            if (!confirm(`Delete job ${job.id || "(draft)"}?`)) return;
            delete jobsData.jobs[key];
            if (jobsData.currentJobId === key) {
                jobsData.currentJobId = null;
                createNewJob();
            }
            saveJobsData();
            openJobPicker();
        };

        row.appendChild(loadBtn);
        row.appendChild(delBtn);
        list.appendChild(row);
    });

    panel.classList.remove("hidden");
}

function closeJobPicker() {
    document.getElementById("job-picker").classList.add("hidden");
}

function deleteAllJobs() {
    if (!confirm("Delete ALL jobs? This cannot be undone.")) return;
    jobsData.jobs = {};
    jobsData.currentJobId = null;
    saveJobsData();
    createNewJob();
    openJobPicker();
}

function wireAfterFields() {
    document.getElementById("completed-by").oninput = () => {
        const job = getCurrentJob();
        if (!job) return;
        job.completedBy = document.getElementById("completed-by").value;
        saveJobsData();
    };

    document.getElementById("expected-completion-date").oninput = () => {
        const job = getCurrentJob();
        if (!job) return;
        job.expectedCompletionDate = document.getElementById("expected-completion-date").value;
        saveJobsData();
    };

    document.getElementById("completed-date").oninput = () => {
        const job = getCurrentJob();
        if (!job) return;
        job.completedDate = document.getElementById("completed-date").value;
        saveJobsData();
    };

    document.getElementById("job-reference").oninput = () => {
        const job = getCurrentJob();
        if (!job) return;
        job.jobReference = document.getElementById("job-reference").value;
        saveJobsData();
    };

    document.getElementById("completion-notes").oninput = () => {
        const job = getCurrentJob();
        if (!job) return;
        job.completionNotes = document.getElementById("completion-notes").value;
        saveJobsData();
    };
}

function init() {
    loadJobsData();

    if (!jobsData.currentJobId || !jobsData.jobs[jobsData.currentJobId]) {
        createNewJob();
    } else {
        renderAllSections();
    }

    document.getElementById("export-csv-btn").onclick = exportCSV;
    document.getElementById("export-pdf-btn").onclick = exportPDF;
    document.getElementById("new-job-btn").onclick = handleNewJob;
    document.getElementById("load-job-btn").onclick = openJobPicker;
    document.getElementById("job-date").onchange = handleJobDateChange;
    document.getElementById("engineer-name").oninput = handleEngineerNameChange;
    document.getElementById("close-job-picker").onclick = closeJobPicker;
    document.getElementById("delete-all-jobs").onclick = deleteAllJobs;

    wireAfterFields();
}

init();
</script>

<script>
window.addEventListener("load", () => {
    const burgerBtn = document.getElementById("burger-btn");
    const sideMenu = document.getElementById("side-menu");

    if (!burgerBtn || !sideMenu) return;

    burgerBtn.addEventListener("click", () => {
        sideMenu.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
        if (!sideMenu.contains(e.target) && e.target !== burgerBtn) {
            sideMenu.classList.remove("open");
        }
    });
});
</script>
