<script>
const jsPDF = window.jspdf ? window.jspdf.jsPDF : window.jsPDF;
const STORAGE_KEY = "materialRecoveryJobs_v3";
const MAX_SECTION_PHOTOS = 8;

let jobsData = { jobs: {}, currentJobId: null };

function saveJobsData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jobsData));
}

function createStorageKey() {
    return `job_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

function loadJobsData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            jobsData = JSON.parse(saved);
        } catch (e) {
            jobsData = { jobs: {}, currentJobId: null };
        }
    }
    if (!jobsData.jobs || typeof jobsData.jobs !== "object") jobsData.jobs = {};

    for (const key of Object.keys(jobsData.jobs)) {
        jobsData.jobs[key] = normalizeJob(jobsData.jobs[key]);
    }
}

function normalizeJob(job) {
    return {
        id: job.id || "",
        shiftDate: job.shiftDate || todayISO(),
        engineerName: job.engineerName || "",
        sections: Array.isArray(job.sections) && job.sections.length
            ? job.sections.map(normalizeSection)
            : [createBlankSection()]
    };
}

function normalizePhotoEntry(photo, index) {
    if (!photo) return null;
    if (typeof photo === "string") return photo;
    if (typeof photo === "object" && photo.dataUrl) return photo.dataUrl;
    return null;
}

function normalizeSection(section) {
    const fields = section && section.fields ? section.fields : {};
    return {
        fields: {
            elr: fields.elr || "",
            startMiles: fields.startMiles || "",
            startChains: fields.startChains || "",
            endMiles: fields.endMiles || "",
            endChains: fields.endChains || "",
            accessLocation: fields.accessLocation || "",
            egressLocation: fields.egressLocation || "",
            rrapPresent: Boolean(fields.rrapPresent),
            rrapMiles: fields.rrapMiles || "",
            rrapChains: fields.rrapChains || "",
            laydownPresent: Boolean(fields.laydownPresent),
            laydownAccessPoint: fields.laydownAccessPoint || "",
            notes: fields.notes || ""
        },
        items: Array.isArray(section && section.items) && section.items.length
            ? section.items.map(item => ({
                materialType: item.materialType || "Plain Line Rail",
                condition: item.condition || "",
                qty: item.qty || "",
                length: item.length || "",
                location: item.location || "",
                comments: item.comments || ""
            }))
            : [{ materialType: "Plain Line Rail", condition: "", qty: "", length: "", location: "", comments: "" }],
        photos: Array.isArray(section && section.photos)
            ? section.photos.map((photo, index) => normalizePhotoEntry(photo, index)).filter(Boolean)
            : []
    };
}

function getCurrentJob() {
    return jobsData.jobs[jobsData.currentJobId] || null;
}

function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatUK(iso) {
    if (!iso) return "-";
    const parts = iso.split("-");
    if (parts.length !== 3) return iso;
    const [y, m, d] = parts;
    return `${d}/${m}/${y}`;
}

function getInitials(name) {
    if (!name) return "";
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "";
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function cleanPart(str) {
    return String(str || "")
        .trim()
        .replace(/\s+/g, " ")
        .replace(/[^A-Za-z0-9 ]/g, "")
        .trim();
}

function mileagePart(miles, chains) {
    const m = cleanPart(miles);
    const ch = cleanPart(chains);
    if (!m && !ch) return "";
    if (!m) return `${ch}ch`;
    if (!ch) return `${m}m`;
    return `${m}m ${ch}ch`;
}

function buildJobId(job) {
    const section = job.sections && job.sections[0] ? job.sections[0] : createBlankSection();
    const f = section.fields;
    const elr = cleanPart(f.elr);
    const start = mileagePart(f.startMiles, f.startChains);
    const end = mileagePart(f.endMiles, f.endChains);
    const initials = getInitials(job.engineerName);

    const parts = [];
    if (elr) parts.push(elr);
    if (start || end) {
        if (start && end) {
            parts.push(`${start} - ${end}`);
        } else {
            parts.push(start || end);
        }
    }
    if (initials) parts.push(initials);

    return parts.join(" ").trim();
}

function createBlankSection() {
    return {
        fields: {
            elr: "",
            startMiles: "",
            startChains: "",
            endMiles: "",
            endChains: "",
            accessLocation: "",
            egressLocation: "",
            rrapPresent: false,
            rrapMiles: "",
            rrapChains: "",
            laydownPresent: false,
            laydownAccessPoint: "",
            notes: ""
        },
        items: [
            { materialType: "Plain Line Rail", condition: "", qty: "", length: "", location: "", comments: "" }
        ],
        photos: []
    };
}

function createNewJob() {
    const storageKey = createStorageKey();
    jobsData.jobs[storageKey] = normalizeJob({
        id: "",
        shiftDate: todayISO(),
        engineerName: document.getElementById("engineer-name")?.value?.trim() || "",
        sections: [createBlankSection()]
    });
    jobsData.currentJobId = storageKey;
    rebuildJobIdentity();
    saveJobsData();
    renderAllSections();
}

function rebuildJobIdentity() {
    const job = getCurrentJob();
    if (!job) return;
    if (!job.sections || !job.sections.length) job.sections = [createBlankSection()];
    job.id = buildJobId(job);
    saveJobsData();
    updateJobHeaderFields();
}

function updateJobHeaderFields() {
    const job = getCurrentJob();
    const jobIdInput = document.getElementById("job-id");
    const jobDateInput = document.getElementById("job-date");
    const engineerNameInput = document.getElementById("engineer-name");

    if (!job) {
        jobIdInput.value = "";
        jobDateInput.value = "";
        engineerNameInput.value = "";
        return;
    }

    jobIdInput.value = job.id || "";
    jobDateInput.value = job.shiftDate || "";
    engineerNameInput.value = job.engineerName || "";
}

function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function fixImageOrientation(file) {
    return new Promise((resolve, reject) => {
        const fallback = () => readFileAsDataURL(file).then(resolve).catch(reject);
        if (!window.EXIF) {
            fallback();
            return;
        }

        EXIF.getData(file, function () {
            const orientation = EXIF.getTag(this, "Orientation") || 1;
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    const width = img.width;
                    const height = img.height;

                    if ([5, 6, 7, 8].includes(orientation)) {
                        canvas.width = height;
                        canvas.height = width;
                    } else {
                        canvas.width = width;
                        canvas.height = height;
                    }

                    switch (orientation) {
                        case 2:
                            ctx.translate(width, 0);
                            ctx.scale(-1, 1);
                            break;
                        case 3:
                            ctx.translate(width, height);
                            ctx.rotate(Math.PI);
                            break;
                        case 4:
                            ctx.translate(0, height);
                            ctx.scale(1, -1);
                            break;
                        case 5:
                            ctx.rotate(0.5 * Math.PI);
                            ctx.scale(1, -1);
                            break;
                        case 6:
                            ctx.rotate(0.5 * Math.PI);
                            ctx.translate(0, -height);
                            break;
                        case 7:
                            ctx.rotate(0.5 * Math.PI);
                            ctx.translate(width, -height);
                            ctx.scale(-1, 1);
                            break;
                        case 8:
                            ctx.rotate(-0.5 * Math.PI);
                            ctx.translate(-width, 0);
                            break;
                    }

                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL("image/jpeg", 0.92));
                };
                img.onerror = fallback;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    });
}

async function addPhotosToSection(input, sectionIndex) {
    const job = getCurrentJob();
    if (!job || !input.files || !input.files.length) return;
    const section = job.sections[sectionIndex];
    if (!section) return;

    section.photos = Array.isArray(section.photos) ? section.photos : [];

    const remaining = MAX_SECTION_PHOTOS - section.photos.length;
    if (remaining <= 0) {
        alert(`Maximum of ${MAX_SECTION_PHOTOS} photos allowed in this section.`);
        input.value = "";
        return;
    }

    const files = Array.from(input.files).slice(0, remaining);
    if (input.files.length > remaining) {
        alert(`Only the first ${remaining} photo(s) were added. Maximum is ${MAX_SECTION_PHOTOS}.`);
    }

    for (const file of files) {
        try {
            const corrected = await fixImageOrientation(file);
            section.photos.push(corrected);
        } catch (e) {
            console.error("Photo upload failed", e);
        }
    }

    saveJobsData();
    renderSectionPhotoPreview(sectionIndex);
    input.value = "";
}

function renderPreview(containerId, photos, onDelete) {
    const container = document.getElementById(containerId);
    if (!container) return;

    container.innerHTML = "";

    (photos || []).forEach((src, idx) => {
        const wrap = document.createElement("div");
        wrap.style.display = "inline-flex";
        wrap.style.flexDirection = "column";
        wrap.style.alignItems = "center";
        wrap.style.margin = "4px";
        wrap.style.gap = "4px";

        const img = document.createElement("img");
        img.src = typeof src === "string" ? src : (src && src.dataUrl ? src.dataUrl : "");
        img.style.width = "80px";
        img.style.height = "80px";
        img.style.objectFit = "cover";
        img.style.border = "1px solid #ccc";
        img.style.borderRadius = "4px";
        img.style.background = "#fff";

        const del = document.createElement("button");
        del.type = "button";
        del.textContent = "Remove";
        del.className = "small-btn";
        del.style.background = "#d9534f";
        del.onclick = () => onDelete(idx);

        wrap.appendChild(img);
        wrap.appendChild(del);
        container.appendChild(wrap);
    });
}

function renderSectionPhotoPreview(sectionIndex) {
    const job = getCurrentJob();
    if (!job) return;
    const section = job.sections[sectionIndex];
    if (!section) return;

    const summary = document.getElementById(`section-photo-summary-${sectionIndex}`);
    if (summary) {
        const count = (section.photos || []).length;
        summary.innerHTML = count
            ? `<strong>${count} photo(s) attached</strong>`
            : `<span class="hint">No photos attached yet.</span>`;
    }

    renderPreview(`section-photo-preview-${sectionIndex}`, section.photos || [], idx => {
        section.photos.splice(idx, 1);
        saveJobsData();
        renderSectionPhotoPreview(sectionIndex);
    });
}

function renderAllSections() {
    const job = getCurrentJob();
    const container = document.getElementById("sectionsContainer");
    container.innerHTML = "";
    if (!job) return;

    updateJobHeaderFields();
    job.sections.forEach((section, index) => {
        container.appendChild(renderSection(job, section, index));
    });
}

function renderSection(job, sectionData, index) {
    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";

    const title = document.createElement("span");
    title.className = "section-title";
    title.textContent = `Section ${index + 1}`;

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete Section";
    delBtn.className = "small-btn";
    delBtn.style.background = "#d9534f";
    delBtn.onclick = () => {
        if (job.sections.length === 1) {
            alert("At least one section must remain.");
            return;
        }
        job.sections.splice(index, 1);
        saveJobsData();
        rebuildJobIdentity();
        renderAllSections();
    };

    header.appendChild(title);
    header.appendChild(delBtn);
    sectionEl.appendChild(header);

    const row1 = document.createElement("div");
    row1.className = "field-row";

    row1.appendChild(makeField("ELR:", sectionData.fields.elr, v => { sectionData.fields.elr = v; saveJobsData(); if (index === 0) rebuildJobIdentity(); }));
    row1.appendChild(makeField("Start Miles:", sectionData.fields.startMiles, v => { sectionData.fields.startMiles = v; saveJobsData(); if (index === 0) rebuildJobIdentity(); }));
    row1.appendChild(makeField("Start Chains:", sectionData.fields.startChains, v => { sectionData.fields.startChains = v; saveJobsData(); if (index === 0) rebuildJobIdentity(); }));
    row1.appendChild(makeField("End Miles:", sectionData.fields.endMiles, v => { sectionData.fields.endMiles = v; saveJobsData(); if (index === 0) rebuildJobIdentity(); }));
    row1.appendChild(makeField("End Chains:", sectionData.fields.endChains, v => { sectionData.fields.endChains = v; saveJobsData(); if (index === 0) rebuildJobIdentity(); }));
    sectionEl.appendChild(row1);

    const row2 = document.createElement("div");
    row2.className = "field-row";
    row2.appendChild(makeField("Access:", sectionData.fields.accessLocation, v => { sectionData.fields.accessLocation = v; saveJobsData(); }));
    row2.appendChild(makeField("Egress:", sectionData.fields.egressLocation, v => { sectionData.fields.egressLocation = v; saveJobsData(); }));
    sectionEl.appendChild(row2);

    const row3 = document.createElement("div");
    row3.className = "field-row";
    const rrap = makeCheckbox("RRAP Present:", sectionData.fields.rrapPresent, v => {
        sectionData.fields.rrapPresent = v;
        saveJobsData();
        renderAllSections();
    });
    row3.appendChild(rrap);

    if (sectionData.fields.rrapPresent) {
        row3.appendChild(makeField("RRAP Miles:", sectionData.fields.rrapMiles, v => { sectionData.fields.rrapMiles = v; saveJobsData(); }));
        row3.appendChild(makeField("RRAP Chains:", sectionData.fields.rrapChains, v => { sectionData.fields.rrapChains = v; saveJobsData(); }));
    }

    const lay = makeCheckbox("Laydown:", sectionData.fields.laydownPresent, v => {
        sectionData.fields.laydownPresent = v;
        saveJobsData();
        renderAllSections();
    });
    row3.appendChild(lay);

    if (sectionData.fields.laydownPresent) {
        row3.appendChild(makeField("Laydown Access:", sectionData.fields.laydownAccessPoint, v => { sectionData.fields.laydownAccessPoint = v; saveJobsData(); }));
    }
    sectionEl.appendChild(row3);

    const row4 = document.createElement("div");
    row4.className = "field-row";
    row4.appendChild(makeField("Notes:", sectionData.fields.notes, v => { sectionData.fields.notes = v; saveJobsData(); }, "250px"));
    sectionEl.appendChild(row4);

    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const tr = document.createElement("tr");
    ["Material Type","Condition","Qty","Length","Location","Comments","Actions"].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        tr.appendChild(th);
    });
    thead.appendChild(tr);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    sectionData.items.forEach((item, idx) => {
        tbody.appendChild(renderItemRow(sectionData, item, idx));
    });
    table.appendChild(tbody);
    sectionEl.appendChild(table);

    const addLine = document.createElement("button");
    addLine.textContent = "Add Material";
    addLine.className = "small-btn";
    addLine.onclick = () => {
        sectionData.items.push({ materialType: "Plain Line Rail", condition: "", qty: "", length: "", location: "", comments: "" });
        saveJobsData();
        renderAllSections();
    };
    sectionEl.appendChild(addLine);

    const photoBlock = document.createElement("div");
    photoBlock.className = "photo-block";
    photoBlock.innerHTML = `
        <label>
            Add Photo(s)
            <input id="section-photo-input-${index}" type="file" accept="image/*" multiple>
        </label>
        <div class="hint">Selected photos will appear below. Remove any photo if you pick the wrong one.</div>
        <div id="section-photo-summary-${index}" class="photo-summary"><span class="hint">No photos attached yet.</span></div>
        <div id="section-photo-preview-${index}" class="photo-grid"></div>
    `;
    const photoInput = photoBlock.querySelector("input");
    photoInput.onchange = () => addPhotosToSection(photoInput, index);
    sectionEl.appendChild(photoBlock);

    renderSectionPhotoPreview(index);

    return sectionEl;
}

function makeField(labelText, value, onChange, minWidth) {
    const wrapper = document.createElement("label");
    wrapper.textContent = labelText;

    const input = document.createElement("input");
    input.value = value || "";
    if (minWidth) input.style.minWidth = minWidth;
    input.oninput = () => onChange(input.value);

    wrapper.appendChild(input);
    return wrapper;
}

function makeCheckbox(labelText, checked, onChange) {
    const wrapper = document.createElement("label");
    wrapper.style.flexDirection = "row";
    wrapper.style.alignItems = "center";
    wrapper.style.gap = "8px";
    wrapper.textContent = labelText;

    const input = document.createElement("input");
    input.type = "checkbox";
    input.checked = checked;
    input.onchange = () => onChange(input.checked);

    wrapper.appendChild(input);
    return wrapper;
}

function renderItemRow(sectionData, item, idx) {
    const tr = document.createElement("tr");
    tr.appendChild(makeSelectCell(item, "materialType", [
        "Plain Line Rail",
        "Switch",     
        "Crossing",
        "Ballast",
		"Baseplates",
		"Bearers",
		"Bolts",
		"Check Rail",
		"Clips",
		"Concrete Sleepers",
		"Fishplates",
		"General Waste",
		"IBJs",
		"Other",
		"Pads",
		"Timber Sleepers",
		"Troughing"
    ]));
    tr.appendChild(makeSelectCell(item, "condition", ["", "Scrap", "Serviceable", "New"]));
    tr.appendChild(makeInputCell(item, "qty"));
    tr.appendChild(makeInputCell(item, "length"));
    tr.appendChild(makeSelectCell(item, "location", [
        "Down Fast Cess","Down Fast 4ft","Down/Up Fast 6ft","Up Fast 4ft",
        "Up Fast/Down Slow 10ft","Down Slow 4ft","Up Slow/Down Slow 6ft",
        "Up Slow 4ft","Up Slow Cess","Siding","Branch Line","Other"
    ]));
    tr.appendChild(makeInputCell(item, "comments"));

    const td = document.createElement("td");
    const del = document.createElement("button");
    del.textContent = "Remove";
    del.className = "small-btn";
    del.style.background = "#d9534f";
    del.onclick = () => {
        sectionData.items.splice(idx, 1);
        if (!sectionData.items.length) {
            sectionData.items.push({ materialType: "Plain Line Rail", condition: "", qty: "", length: "", location: "", comments: "" });
        }
        saveJobsData();
        renderAllSections();
    };
    td.appendChild(del);
    tr.appendChild(td);
    return tr;
}

function makeInputCell(item, key) {
    const td = document.createElement("td");
    const input = document.createElement("input");
    input.value = item[key] || "";
    input.oninput = () => { item[key] = input.value; saveJobsData(); };
    td.appendChild(input);
    return td;
}

function makeSelectCell(item, key, options) {
    const td = document.createElement("td");
    const sel = document.createElement("select");
    options.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        sel.appendChild(opt);
    });
    sel.value = item[key] || options[0];
    sel.onchange = () => { item[key] = sel.value; saveJobsData(); };
    td.appendChild(sel);
    return td;
}

function exportCSV() {
    const job = getCurrentJob();
    if (!job) return alert("No job loaded.");

    const rows = [
        "JobID,ShiftDate,EngineerName,EngineerInitials,Section,ELR,StartMiles,StartChains,EndMiles,EndChains,Access,Egress,RRAP,RRAPMiles,RRAPChains,Laydown,LaydownAccess,Notes,PhotoCount,MaterialType,Condition,Qty,Length,Location,Comments"
    ];

    const initials = getInitials(job.engineerName);

    job.sections.forEach((s, i) => {
        s.items.forEach(item => {
            rows.push([
                job.id,
                job.shiftDate,
                job.engineerName || "",
                initials,
                i + 1,
                s.fields.elr,
                s.fields.startMiles,
                s.fields.startChains,
                s.fields.endMiles,
                s.fields.endChains,
                s.fields.accessLocation,
                s.fields.egressLocation,
                s.fields.rrapPresent ? "Yes" : "No",
                s.fields.rrapMiles,
                s.fields.rrapChains,
                s.fields.laydownPresent ? "Yes" : "No",
                s.fields.laydownAccessPoint,
                s.fields.notes,
                (s.photos || []).length,
                item.materialType,
                item.condition,
                item.qty,
                item.length,
                item.location,
                item.comments || ""
            ].map(v => `"${String(v || "").replace(/"/g,'""')}"`).join(","));
        });
    });

    downloadBlob(new Blob([rows.join("\n")], { type: "text/csv" }), `${job.id || "material-recovery-job"}.csv`);
}

async function addPhotosToPdf(pdf, photos, title, pageWidth) {
    for (let i = 0; i < photos.length; i++) {
        const entry = typeof photos[i] === "string" ? { name: `Photo ${i + 1}`, dataUrl: photos[i] } : photos[i];
        const src = entry.dataUrl;
        pdf.addPage();
        drawPdfHeader(pdf, pageWidth, title);
        pdf.setFontSize(12);
        pdf.text(`${title} ${i + 1}`, 10, 30);

        await new Promise(resolve => {
            const img = new Image();
            img.onload = function () {
                const pageHeight = pdf.internal.pageSize.getHeight();
                const maxW = pageWidth - 20;
                const maxH = pageHeight - 42;
                const ratio = Math.min(maxW / img.width, maxH / img.height);
                const drawW = img.width * ratio;
                const drawH = img.height * ratio;
                const x = (pageWidth - drawW) / 2;
                const y = 34;
                pdf.addImage(img, "JPEG", x, y, drawW, drawH);
                resolve();
            };
            img.onerror = resolve;
            img.src = src;
        });
    }
}

function drawPdfHeader(pdf, pageWidth, reportTitle, job = getCurrentJob()) {
    pdf.setFillColor(10, 31, 68);
    pdf.rect(0, 0, pageWidth, 22, "F");
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(14);
    pdf.text(reportTitle, 10, 14);
    pdf.setFontSize(10);
    pdf.text(`Job: ${job.id || "-"}`, pageWidth - 120, 9);
    pdf.text(`Shift: ${formatUK(job.shiftDate)}`, pageWidth - 120, 14);
    pdf.text(`Engineer: ${job.engineerName || "-"}`, pageWidth - 120, 19);
    pdf.setTextColor(0, 0, 0);
}

async function exportPDF() {
    const job = getCurrentJob();
    if (!job) return alert("No job loaded.");

    const pdf = new jsPDF("l", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();

    drawPdfHeader(pdf, pageWidth, "Material Recovery Scoping Report", job);
    let currentY = 30;

    for (let idx = 0; idx < job.sections.length; idx++) {
        const section = job.sections[idx];

        if (currentY > 170) {
            pdf.addPage();
            drawPdfHeader(pdf, pageWidth, "Material Recovery Scoping Report", job);
            currentY = 30;
        }

        pdf.setFontSize(12);
        pdf.text(`Section ${idx + 1}`, 10, currentY);
        currentY += 6;

        const f = section.fields;
        const metaBody = [
            ["ELR", f.elr || ""],
            ["Start Mileage", mileagePart(f.startMiles, f.startChains)],
            ["End Mileage", mileagePart(f.endMiles, f.endChains)],
            ["Access", f.accessLocation || ""],
            ["Egress", f.egressLocation || ""],
            ["RRAP Present", f.rrapPresent ? "Yes" : "No"],
            ["RRAP Mileage", f.rrapPresent ? mileagePart(f.rrapMiles, f.rrapChains) : ""],
            ["Laydown Present", f.laydownPresent ? "Yes" : "No"],
            ["Laydown Access", f.laydownPresent ? (f.laydownAccessPoint || "") : ""],
            ["Notes", f.notes || ""]
        ];

        pdf.autoTable({
            startY: currentY,
            head: [["Field", "Value"]],
            body: metaBody,
            theme: "grid",
            styles: { fontSize: 9, cellPadding: 2 },
            headStyles: { fillColor: [226, 226, 226] },
            margin: { left: 10, right: 10, top: 28 },
            didDrawPage: data => {
                if (data.pageNumber > 1) drawPdfHeader(pdf, pageWidth, "Material Recovery Scoping Report", job);
            }
        });

        currentY = pdf.lastAutoTable.finalY + 6;

        const itemsBody = section.items.map(item => [
            item.materialType || "",
            item.condition || "",
            item.qty || "",
            item.length || "",
            item.location || "",
            item.comments || ""
        ]);

        pdf.autoTable({
            startY: currentY,
            head: [["Material Type", "Condition", "Qty", "Length", "Location", "Comments"]],
            body: itemsBody,
            theme: "grid",
            styles: { fontSize: 9, cellPadding: 2 },
            headStyles: { fillColor: [200, 200, 200] },
            margin: { left: 10, right: 10, top: 28 },
            didDrawPage: data => {
                if (data.pageNumber > 1) drawPdfHeader(pdf, pageWidth, "Material Recovery Scoping Report", job);
            }
        });

        currentY = pdf.lastAutoTable.finalY + 8;

        if (section.photos && section.photos.length) {
            await addPhotosToPdf(pdf, section.photos, `Section ${idx + 1} Photos`, pageWidth);
        }
    }

    pdf.save(`${job.id || "material-recovery-job"}.pdf`);
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function handleNewJob() {
    if (getCurrentJob()) {
        const ok = confirm("Start a new job? Current job will stay saved and you’ll get a fresh sheet.");
        if (!ok) return;
    }
    createNewJob();
}

function handleJobDateChange() {
    const job = getCurrentJob();
    if (!job) return;
    const iso = document.getElementById("job-date").value;
    if (!iso) return;
    job.shiftDate = iso;
    saveJobsData();
    updateJobHeaderFields();
}

function handleEngineerNameChange() {
    const job = getCurrentJob();
    if (!job) return;
    job.engineerName = document.getElementById("engineer-name").value.trim();
    rebuildJobIdentity();
}

function openJobPicker() {
    const panel = document.getElementById("job-picker");
    const list = document.getElementById("job-picker-list");
    list.innerHTML = "";

    const keys = Object.keys(jobsData.jobs).sort((a, b) => {
        const aJob = jobsData.jobs[a];
        const bJob = jobsData.jobs[b];
        return (bJob.shiftDate || "").localeCompare(aJob.shiftDate || "") || ((bJob.id || "").localeCompare(aJob.id || ""));
    });

    if (!keys.length) {
        const msg = document.createElement("div");
        msg.textContent = "No saved jobs on this device.";
        list.appendChild(msg);
        panel.classList.remove("hidden");
        return;
    }

    keys.forEach(key => {
        const job = jobsData.jobs[key];
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.gap = "8px";
        row.style.marginBottom = "10px";

        const loadBtn = document.createElement("button");
        loadBtn.textContent = `${job.id || "(draft)"} | ${formatUK(job.shiftDate) || "-"} | ${job.engineerName || "-"}`;
        loadBtn.style.flex = "1";
        loadBtn.onclick = () => {
            jobsData.currentJobId = key;
            saveJobsData();
            renderAllSections();
            closeJobPicker();
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "small-btn";
        delBtn.style.background = "#b30000";
        delBtn.style.color = "white";
        delBtn.style.width = "80px";
        delBtn.onclick = () => {
            if (!confirm(`Delete job ${job.id || "(draft)"}?`)) return;
            delete jobsData.jobs[key];
            if (jobsData.currentJobId === key) {
                jobsData.currentJobId = null;
                createNewJob();
            }
            saveJobsData();
            openJobPicker();
        };

        row.appendChild(loadBtn);
        row.appendChild(delBtn);
        list.appendChild(row);
    });

    panel.classList.remove("hidden");
}

function closeJobPicker() {
    document.getElementById("job-picker").classList.add("hidden");
}

function deleteAllJobs() {
    if (!confirm("Delete ALL jobs? This cannot be undone.")) return;
    jobsData.jobs = {};
    jobsData.currentJobId = null;
    saveJobsData();
    createNewJob();
    openJobPicker();
}

function init() {
    loadJobsData();

    if (!jobsData.currentJobId || !jobsData.jobs[jobsData.currentJobId]) {
        createNewJob();
    } else {
        renderAllSections();
    }

    document.getElementById("add-section-btn").onclick = () => {
        const job = getCurrentJob();
        if (!job) return createNewJob();
        job.sections.push(createBlankSection());
        saveJobsData();
        renderAllSections();
    };

    document.getElementById("export-csv-btn").onclick = exportCSV;
    document.getElementById("export-pdf-btn").onclick = exportPDF;
    document.getElementById("new-job-btn").onclick = handleNewJob;
    document.getElementById("load-job-btn").onclick = openJobPicker;
    document.getElementById("job-date").onchange = handleJobDateChange;
    document.getElementById("engineer-name").oninput = handleEngineerNameChange;
    document.getElementById("close-job-picker").onclick = closeJobPicker;
    document.getElementById("delete-all-jobs").onclick = deleteAllJobs;
}

init();
</script>

<script>
window.addEventListener("load", () => {
    const burgerBtn = document.getElementById("burger-btn");
    const sideMenu = document.getElementById("side-menu");
    if (!burgerBtn || !sideMenu) return;

    burgerBtn.addEventListener("click", () => {
        sideMenu.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
        if (!sideMenu.contains(e.target) && e.target !== burgerBtn) {
            sideMenu.classList.remove("open");
        }
    });
});
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registered"))
        .catch(err => console.error("SW registration failed:", err));
}
</script>
